
<!DOCTYPE html>
<body style="margin:0;padding:14px 16px;">

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
  <div style="background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);">w (weight)</div>
    <input type="range" id="sw" min="1" max="99" value="20" style="width:100%;margin:4px 0;">
    <div id="vw" style="font-size:15px;font-weight:500;"></div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);">x = 1000 (fixed)</div>
    <div style="font-size:15px;font-weight:500;margin-top:8px;">1000</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);">y = 50 (fixed)</div>
    <div style="font-size:15px;font-weight:500;margin-top:8px;">50</div>
  </div>
</div>

<canvas id="cv" style="width:100%;display:block;border-radius:8px;" height="200"></canvas>

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;">
  <div style="background:var(--color-background-secondary);border-radius:8px;padding:10px 14px;">
    <div style="font-size:11px;color:var(--color-text-secondary);">Loss = (y − wx)²</div>
    <div id="vloss" style="font-size:16px;font-weight:500;margin-top:4px;"></div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:8px;padding:10px 14px;">
    <div style="font-size:11px;color:var(--color-text-secondary);">Gradient = −2x(y−wx)</div>
    <div id="vgrad" style="font-size:16px;font-weight:500;margin-top:4px;"></div>
  </div>
</div>

<div id="msg" style="margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;text-align:center;"></div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const sw = document.getElementById('sw');

function resize(){
  cv.width = cv.offsetWidth * devicePixelRatio;
  cv.height = 200 * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}

function draw(){
  const W = cv.offsetWidth, H = 200;
  const dark = matchMedia('(prefers-color-scheme:dark)').matches;
  ctx.clearRect(0,0,W,H);

  const x=1000, y=50;
  const wVal = parseFloat(sw.value)/1000; // 0.001 to 0.099
  const wOpt = y/x; // 0.05

  const wMin=0, wMax=0.1;
  function L(wv){ return Math.pow(y - wv*x, 2); }
  function toC(wv,lv){
    const cx2 = 50 + (wv-wMin)/(wMax-wMin)*(W-70);
    const maxL = 2500;
    const cy2 = H-30 - (lv/maxL)*(H-60);
    return [cx2, Math.max(8, Math.min(H-8, cy2))];
  }

  const textCol = dark?'#c2c0b6':'#3d3d3a';
  const axisCol = dark?'#444':'#ddd';

  // Axes
  ctx.strokeStyle=axisCol; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(50,10); ctx.lineTo(50,H-28); ctx.lineTo(W-15,H-28); ctx.stroke();
  ctx.fillStyle=textCol; ctx.font='11px sans-serif';
  ctx.fillText('w →', W-30, H-20);
  ctx.fillText('Loss', 4, 20);

  // Axis tick for optimal w
  const [optX] = toC(wOpt, 0);
  ctx.strokeStyle='#1D9E75'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(optX,10); ctx.lineTo(optX,H-28); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#1D9E75'; ctx.font='10px sans-serif';
  ctx.fillText('best w=0.05', optX-24, H-14);

  // Loss curve
  ctx.strokeStyle='#7F77DD'; ctx.lineWidth=2.5;
  ctx.beginPath();
  let first=true;
  for(let wv=wMin; wv<=wMax; wv+=0.001){
    const [cx2,cy2]=toC(wv,L(wv));
    if(first){ctx.moveTo(cx2,cy2);first=false;}
    else ctx.lineTo(cx2,cy2);
  }
  ctx.stroke();

  // Current point
  const lw=L(wVal);
  const grad=-2*x*(y-wVal*x);
  const [pcx,pcy]=toC(wVal,lw);

  // Tangent
  const tw=0.008;
  const [t1x,t1y]=toC(wVal-tw, lw+grad*(-tw));
  const [t2x,t2y]=toC(wVal+tw, lw+grad*(tw));
  const tCol=Math.abs(grad)<100?'#1D9E75':grad>0?'#D85A30':'#EF9F27';
  ctx.strokeStyle=tCol; ctx.lineWidth=2; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(t1x,t1y); ctx.lineTo(t2x,t2y); ctx.stroke();
  ctx.setLineDash([]);

  // Arrow showing direction to move
  if(Math.abs(grad)>100){
    const arrowDir = grad > 0 ? -1 : 1;
    const ax1 = pcx, ax2 = pcx + arrowDir*40;
    ctx.strokeStyle=tCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ax1,pcy-20); ctx.lineTo(ax2,pcy-20); ctx.stroke();
    ctx.fillStyle=tCol; ctx.font='10px sans-serif';
    ctx.fillText(grad>0?'← w ghataao':'w badhaao →', Math.min(ax1,ax2)-2, pcy-26);
  }

  // Point
  ctx.fillStyle=tCol;
  ctx.beginPath(); ctx.arc(pcx,pcy,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=dark?'#111':'#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(pcx,pcy,7,0,Math.PI*2); ctx.stroke();

  // Update cards
  document.getElementById('vw').textContent = wVal.toFixed(3);
  document.getElementById('vloss').textContent = lw.toFixed(1);
  const gEl = document.getElementById('vgrad');
  gEl.textContent = grad.toFixed(0);
  gEl.style.color = tCol;

  const msg = document.getElementById('msg');
  if(Math.abs(grad)<100){
    msg.textContent = '✓ Gradient ≈ 0 — Minimum mil gaya! w = 0.05 sahi hai.';
    msg.style.background='var(--color-background-success)';
    msg.style.color='var(--color-text-success)';
  } else if(grad>0){
    msg.textContent = `Gradient positive (${grad.toFixed(0)}) → w zyada hai → GHATAAO ←`;
    msg.style.background='var(--color-background-danger)';
    msg.style.color='var(--color-text-danger)';
  } else {
    msg.textContent = `Gradient negative (${grad.toFixed(0)}) → w kam hai → BADHAAO →`;
    msg.style.background='var(--color-background-warning)';
    msg.style.color='var(--color-text-warning)';
  }
}

sw.addEventListener('input', draw);
window.addEventListener('resize', resize);
resize();
</script>
</body>
